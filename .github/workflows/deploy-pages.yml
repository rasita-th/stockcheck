name: Deploy GitHub Pages

on:
  workflow_dispatch:
  push:
    branches: ["main"]
  workflow_run:
    workflows: ["Refresh Market Pulse v9.6 (safe)"]
    types: [completed]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: stockcheck-pages-deploy
  cancel-in-progress: true

jobs:
  build:
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Prepare clean Pages artifact
        run: |
          python -m py_compile scripts/prepare_stable_site_v9_4_1.py
          python scripts/prepare_stable_site_v9_4_1.py

      - name: Validate JavaScript entry points
        run: |
          node --check site/app.js
          node --check site/app-shell-v9-4-6.js
          node --check site/market.js
          node --check site/notification-phase2.js
          node --check site/final-ui-coordinator.js
          node --check site/memo-only-fix.js
          node --check site/attention-p0.js

      - name: Validate data and UI smoke test
        run: |
          python -m py_compile \
            scripts/validate_static_data.py \
            scripts/smoke_test_site_v9_4_6.py \
            scripts/check_ui_view_contract.py
          python scripts/validate_static_data.py
          python scripts/smoke_test_site_v9_4_6.py
          python scripts/check_ui_view_contract.py

      - name: Verify clean UI artifact
        shell: bash
        run: |
          set -euo pipefail
          VERSION="$(python -c 'import runpy; print(runpy.run_path("scripts/prepare_stable_site_v9_4_1.py")["VERSION"])')"
          echo "Deployment version: ${VERSION}"

          test -s site/index.html
          test -s site/styles.css
          test -s site/app.js
          test -s site/app-shell-v9-4-6.css
          test -s site/app-shell-v9-4-6.js
          test -s site/notification-phase2.css
          test -s site/notification-phase2.js
          test -s site/final-ui-coordinator.css
          test -s site/final-ui-coordinator.js
          test -s site/memo-only-fix.css
          test -s site/memo-only-fix.js
          test -s site/attention-p0.css
          test -s site/attention-p0.js
          test -s site/today-view-isolation.css
          test -s site/market.html
          test -s site/market.css
          test -s site/market.js
          test -s site/data/market_pulse.json
          test -s site/data/technical.json
          test -s site/data/fundamental.json
          test -s site/data/attention_today.json
          test -s site/data/earnings_calendar.json

          for asset in \
            styles.css \
            app.js \
            notification-phase2.css \
            notification-phase2.js \
            final-ui-coordinator.css \
            final-ui-coordinator.js \
            memo-only-fix.css \
            memo-only-fix.js; do
            grep -Fq "${asset}?v=${VERSION}" site/index.html
          done
          grep -Fq "app-shell-v9-4-6.css?v=${VERSION}" site/index.html
          grep -Fq "app-shell-v9-4-6.js?v=${VERSION}" site/index.html
          grep -Fq "attention-p0.css?v=10.1.0" site/memo-only-fix.css
          grep -Fq "today-view-isolation.css?v=10.1.0" site/memo-only-fix.css
          grep -Fq "attention-p0.js?v=10.1.0" site/memo-only-fix.js
          grep -Fq "body.attention-active .decision-screener" site/today-view-isolation.css
          grep -Fq "body.attention-active .workspace" site/today-view-isolation.css
          grep -Fq "normalizePayload" site/attention-p0.js
          grep -Fq "News & Events" site/attention-p0.js
          grep -Fq "market.css?v=${VERSION}" site/market.html
          grep -Fq "market.js?v=${VERSION}" site/market.html
          grep -q 'index.html#today' site/market.html
          grep -q 'index.html#memo' site/market.html
          grep -q 'id="marketBriefing"' site/market.html
          grep -q 'data-pulse-mode="portfolio"' site/market.html
          grep -q 'id="pulseSummaryList"' site/market.html

          if grep -Eq 'scanner-dashboard|scanner-layout-v9-3|shared-app-shell-v9-3|nav-fix-v9-2|thai-time-v9-3|runtime-guard-v9-4-1|mobile-nav-v9-4-2' site/index.html site/market.html; then
            echo 'Conflicting legacy runtime still referenced by deployment artifact'
            exit 1
          fi

      - name: Add nojekyll marker
        run: touch site/.nojekyll

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 15
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Smoke test deployed Market Pulse and Today PR2
        shell: bash
        env:
          PAGE_URL: ${{ steps.deployment.outputs.page_url }}
        run: |
          set -euo pipefail
          BASE="${PAGE_URL%/}"
          test -n "$BASE"

          fetch_and_check_ui() {
            local nonce="$1"
            curl -fsSL --retry 2 --connect-timeout 10 --max-time 30 "${BASE}/index.html?smoke=${nonce}" -o /tmp/index.html \
              && curl -fsSL --retry 2 --connect-timeout 10 --max-time 30 "${BASE}/attention-p0.js?smoke=${nonce}" -o /tmp/attention-p0.js \
              && curl -fsSL --retry 2 --connect-timeout 10 --max-time 30 "${BASE}/today-view-isolation.css?smoke=${nonce}" -o /tmp/today-view-isolation.css \
              && curl -fsSL --retry 2 --connect-timeout 10 --max-time 30 "${BASE}/data/attention_today.json?smoke=${nonce}" -o /tmp/attention_today.json \
              && curl -fsSL --retry 2 --connect-timeout 10 --max-time 30 "${BASE}/market.html?smoke=${nonce}" -o /tmp/market.html \
              && curl -fsSL --retry 2 --connect-timeout 10 --max-time 30 "${BASE}/market.js?smoke=${nonce}" -o /tmp/market.js \
              && curl -fsSL --retry 2 --connect-timeout 10 --max-time 30 "${BASE}/data/market_pulse.json?smoke=${nonce}" -o /tmp/market_pulse.json \
              && grep -q 'memo-only-fix.js' /tmp/index.html \
              && grep -q 'Today Attention' /tmp/attention-p0.js \
              && grep -q 'normalizePayload' /tmp/attention-p0.js \
              && grep -q 'News & Events' /tmp/attention-p0.js \
              && grep -q 'source_chain' /tmp/attention-p0.js \
              && grep -q 'body.attention-active .portfolio-tabs' /tmp/today-view-isolation.css \
              && grep -q 'body.attention-active .workspace' /tmp/today-view-isolation.css \
              && grep -q 'body.attention-active .decision-screener' /tmp/today-view-isolation.css \
              && grep -q 'id="marketBriefing"' /tmp/market.html \
              && grep -q 'data-pulse-mode="balanced"' /tmp/market.html \
              && grep -q 'data-pulse-mode="portfolio"' /tmp/market.html \
              && grep -q 'data-pulse-mode="risk"' /tmp/market.html \
              && grep -q 'normaliseNarrative' /tmp/market.js \
              && grep -q 'applyPortfolioNarrative' /tmp/market.js
          }

          ready=false
          for attempt in $(seq 1 18); do
            nonce="$(date +%s)-${attempt}"
            echo "Production smoke attempt ${attempt}: ${BASE}"
            if fetch_and_check_ui "$nonce"; then
              ready=true
              break
            fi
            sleep 5
          done
          if [ "$ready" != "true" ]; then
            echo "GitHub Pages did not serve the new Market Pulse and Today PR2 UI within the smoke-test window"
            exit 1
          fi

          python - <<'PY'
          import json
          from pathlib import Path

          attention_path = Path('/tmp/attention_today.json')
          attention = json.loads(attention_path.read_text(encoding='utf-8'))
          if not isinstance(attention, dict):
              raise SystemExit('deployed attention_today.json root is not an object')
          if not str(attention.get('schema_version') or '').startswith('2.0'):
              raise SystemExit('deployed attention_today.json is not P0-compatible schema')
          items = attention.get('items')
          if not isinstance(items, list) or len(items) > 7:
              raise SystemExit('deployed attention_today.json items are invalid')
          if attention.get('coverage_status') not in {'complete', 'partial'}:
              raise SystemExit('deployed attention_today.json coverage_status is invalid')
          if not isinstance(attention.get('source_health'), dict):
              raise SystemExit('deployed attention_today.json source_health is missing')

          path = Path('/tmp/market_pulse.json')
          data = json.loads(path.read_text(encoding='utf-8'))
          if not isinstance(data, dict):
              raise SystemExit('deployed market_pulse.json root is not an object')
          for key in ('global_markets', 'us_indices', 'us_sectors', 'themes'):
              rows = data.get(key)
              if not isinstance(rows, list) or not rows:
                  raise SystemExit(f'deployed market_pulse.json missing/non-populated {key}')
          if not data.get('generated_at'):
              raise SystemExit('deployed market_pulse.json missing generated_at')
          narrative = data.get('narrative')
          if narrative is not None:
              modes = narrative.get('modes') if isinstance(narrative, dict) else None
              required = {'balanced', 'portfolio', 'action', 'news', 'risk'}
              if not isinstance(modes, dict) or not required.issubset(modes):
                  raise SystemExit('deployed narrative modes are incomplete')
          print({
              'attention_schema': attention.get('schema_version'),
              'attention_contract': attention.get('contract_version'),
              'attention_items': len(items),
              'attention_coverage': attention.get('coverage_status'),
              'market_schema': data.get('schema_version'),
              'market_generated_at': data.get('generated_at'),
              'market_successful_symbols': data.get('successful_symbols'),
          })
          PY
