name: Deploy GitHub Pages

on:
  workflow_dispatch:
  push:
    branches: ["main"]
    paths-ignore:
      - ".github/deploy-receipt.json"
  workflow_run:
    workflows: ["Refresh Market Pulse v9.6 (safe)"]
    types: [completed]

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: stockcheck-pages-deploy
  cancel-in-progress: true

env:
  TODAY_DEPLOY_VERSION: "10.3.0"

jobs:
  build:
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Prepare clean Pages artifact
        run: |
          python -m py_compile scripts/prepare_stable_site_v9_4_1.py scripts/sync_attention_assets.py
          python scripts/prepare_stable_site_v9_4_1.py
          python scripts/sync_attention_assets.py

      - name: Validate source artifact
        run: |
          node --check site/app.js
          node --check site/app-shell-v9-4-6.js
          node --check site/market.js
          node --check site/notification-phase2.js
          node --check site/final-ui-coordinator.js
          node --check site/memo-only-fix.js
          node --check site/attention-p0.js
          node --check site/attention-pr3.js
          python scripts/validate_static_data.py
          python scripts/smoke_test_site_v9_4_6.py
          python scripts/check_ui_view_contract.py

      - name: Force production cache bust
        env:
          VERSION: ${{ env.TODAY_DEPLOY_VERSION }}
        run: |
          python - <<'PY'
          import os
          import re
          from pathlib import Path

          version = os.environ["VERSION"]
          pages = {
              Path("site/index.html"): (
                  "styles.css",
                  "app.js",
                  "notification-phase2.css",
                  "notification-phase2.js",
                  "final-ui-coordinator.css",
                  "final-ui-coordinator.js",
                  "memo-only-fix.css",
                  "memo-only-fix.js",
                  "app-shell-v9-4-6.css",
                  "app-shell-v9-4-6.js",
              ),
              Path("site/market.html"): (
                  "market.css",
                  "market.js",
                  "app-shell-v9-4-6.css",
              ),
          }
          for path, assets in pages.items():
              text = path.read_text(encoding="utf-8")
              for asset in assets:
                  text = re.sub(
                      rf"({re.escape(asset)})(?:\?[^\"']*)?",
                      rf"\1?v={version}",
                      text,
                      flags=re.IGNORECASE,
                  )
              path.write_text(text, encoding="utf-8")
          PY

      - name: Verify final PR3 artifact
        shell: bash
        run: |
          set -euo pipefail
          test -s site/index.html
          test -s site/attention-p0.js
          test -s site/attention-p0.css
          test -s site/attention-pr3.js
          test -s site/attention-pr3.css
          test -s site/memo-only-fix.js
          test -s site/memo-only-fix.css
          test -s site/today-view-isolation.css
          test -s site/data/attention_today.json
          grep -Fq "memo-only-fix.js?v=${TODAY_DEPLOY_VERSION}" site/index.html
          grep -Fq "memo-only-fix.css?v=${TODAY_DEPLOY_VERSION}" site/index.html
          grep -Fq 'attention-p0.js?v=10.2.0' site/memo-only-fix.js
          grep -Fq 'attention-pr3.js?v=10.3.0' site/memo-only-fix.js
          grep -Fq 'attention-p0.css?v=10.2.0' site/memo-only-fix.css
          grep -Fq 'today-view-isolation.css?v=10.2.1' site/memo-only-fix.css
          grep -Fq 'attention-pr3.css?v=10.3.0' site/memo-only-fix.css
          grep -Fq 'PR3 · PERSONAL RISK DESK' site/attention-pr3.js
          grep -Fq 'เปลี่ยนจากรอบก่อน' site/attention-pr3.js
          grep -Fq 'พัก 1 วัน' site/attention-pr3.js
          grep -Fq 'ซ่อนวันนี้' site/attention-pr3.js
          grep -Fq 'data-pr3-action' site/attention-pr3.js
          grep -Fq 'StockcheckAttentionP3' site/attention-pr3.js
          grep -Fq 'attention-p3-ready' site/attention-pr3.css
          if grep -Fq 'Unverified report' site/attention-pr3.js; then
            echo 'Legacy English verification UI remains in PR3 renderer'
            exit 1
          fi
          if grep -Fq 'technical_json' site/attention-pr3.js; then
            echo 'Internal technical source is exposed in PR3 renderer'
            exit 1
          fi

      - name: Add nojekyll marker
        run: touch site/.nojekyll

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 18
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Smoke test deployed PR3 Today UI
        shell: bash
        env:
          PAGE_URL: ${{ steps.deployment.outputs.page_url }}
          EXPECTED_VERSION: ${{ env.TODAY_DEPLOY_VERSION }}
        run: |
          set -euo pipefail
          BASE="${PAGE_URL%/}"
          test -n "$BASE"

          fetch_and_check_ui() {
            local nonce="$1"
            curl -fsSL --retry 2 --connect-timeout 10 --max-time 30 "${BASE}/index.html?smoke=${nonce}" -o /tmp/index.html || return 1
            curl -fsSL --retry 2 --connect-timeout 10 --max-time 30 "${BASE}/memo-only-fix.js?smoke=${nonce}" -o /tmp/memo-only-fix.js || return 1
            curl -fsSL --retry 2 --connect-timeout 10 --max-time 30 "${BASE}/memo-only-fix.css?smoke=${nonce}" -o /tmp/memo-only-fix.css || return 1
            curl -fsSL --retry 2 --connect-timeout 10 --max-time 30 "${BASE}/attention-p0.js?smoke=${nonce}" -o /tmp/attention-p0.js || return 1
            curl -fsSL --retry 2 --connect-timeout 10 --max-time 30 "${BASE}/attention-pr3.js?smoke=${nonce}" -o /tmp/attention-pr3.js || return 1
            curl -fsSL --retry 2 --connect-timeout 10 --max-time 30 "${BASE}/attention-pr3.css?smoke=${nonce}" -o /tmp/attention-pr3.css || return 1
            curl -fsSL --retry 2 --connect-timeout 10 --max-time 30 "${BASE}/today-view-isolation.css?smoke=${nonce}" -o /tmp/today-view-isolation.css || return 1
            curl -fsSL --retry 2 --connect-timeout 10 --max-time 30 "${BASE}/data/attention_today.json?smoke=${nonce}" -o /tmp/attention_today.json || return 1
            curl -fsSL --retry 2 --connect-timeout 10 --max-time 30 "${BASE}/market.html?smoke=${nonce}" -o /tmp/market.html || return 1
            curl -fsSL --retry 2 --connect-timeout 10 --max-time 30 "${BASE}/market.js?smoke=${nonce}" -o /tmp/market.js || return 1

            grep -Fq "memo-only-fix.js?v=${EXPECTED_VERSION}" /tmp/index.html || return 1
            grep -Fq "memo-only-fix.css?v=${EXPECTED_VERSION}" /tmp/index.html || return 1
            grep -Fq 'attention-p0.js?v=10.2.0' /tmp/memo-only-fix.js || return 1
            grep -Fq 'attention-pr3.js?v=10.3.0' /tmp/memo-only-fix.js || return 1
            grep -Fq 'attention-pr3.css?v=10.3.0' /tmp/memo-only-fix.css || return 1
            grep -Fq 'PR3 · PERSONAL RISK DESK' /tmp/attention-pr3.js || return 1
            grep -Fq 'เปลี่ยนจากรอบก่อน' /tmp/attention-pr3.js || return 1
            grep -Fq 'พัก 1 วัน' /tmp/attention-pr3.js || return 1
            grep -Fq 'data-pr3-action' /tmp/attention-pr3.js || return 1
            grep -Fq 'StockcheckAttentionP3' /tmp/attention-pr3.js || return 1
            grep -Fq 'attention-p3-ready' /tmp/attention-pr3.css || return 1
            grep -Fq 'body.attention-active .workspace' /tmp/today-view-isolation.css || return 1
            grep -Fq 'body.attention-active .decision-screener' /tmp/today-view-isolation.css || return 1
            grep -Fq 'id="marketBriefing"' /tmp/market.html || return 1
            grep -Fq 'normaliseNarrative' /tmp/market.js || return 1
            ! grep -Fq 'Unverified report' /tmp/attention-pr3.js || return 1
            ! grep -Fq 'technical_json' /tmp/attention-pr3.js || return 1
          }

          ready=false
          for attempt in $(seq 1 30); do
            nonce="$(date +%s)-${attempt}"
            echo "Production PR3 smoke attempt ${attempt}: ${BASE}"
            if fetch_and_check_ui "$nonce"; then
              ready=true
              break
            fi
            sleep 5
          done
          if [ "$ready" != "true" ]; then
            echo 'GitHub Pages did not serve the PR3 Today workflow'
            exit 1
          fi

          python - <<'PY'
          import json
          import os
          from datetime import datetime, timezone
          from pathlib import Path

          attention = json.loads(Path('/tmp/attention_today.json').read_text(encoding='utf-8'))
          if not isinstance(attention, dict):
              raise SystemExit('deployed attention payload must be an object')
          if not str(attention.get('contract_version') or '').startswith('3.0'):
              raise SystemExit('deployed Today contract is not PR3 3.0')
          items = attention.get('items')
          technical_watch = attention.get('technical_watch')
          if not isinstance(items, list) or not isinstance(technical_watch, list):
              raise SystemExit('deployed Today sections are missing')
          for item in items + technical_watch:
              if not isinstance(item.get('change'), dict) or not isinstance(item.get('impact'), dict):
                  raise SystemExit(f"deployed PR3 history fields missing: {item.get('ticker')}")
              if not isinstance(item.get('personal_priority_score'), int):
                  raise SystemExit(f"deployed personal priority missing: {item.get('ticker')}")
          for item in items:
              events = item.get('events') if isinstance(item, dict) else None
              if not isinstance(events, list) or not any(event.get('event_type') != 'technical' for event in events):
                  raise SystemExit('technical-only item leaked into deployed main catalysts')
          for item in technical_watch:
              events = item.get('events') if isinstance(item, dict) else None
              if not isinstance(events, list) or not events or any(event.get('event_type') != 'technical' for event in events):
                  raise SystemExit('deployed technical watch contains a non-technical event')
          features = attention.get('features') if isinstance(attention.get('features'), dict) else {}
          health = attention.get('source_health') if isinstance(attention.get('source_health'), dict) else {}
          if features.get('official_regulator_sources') and 'regulators' not in health:
              raise SystemExit('deployed regulator source health is missing')
          for key in ('changes_summary', 'recently_resolved', 'preferences_applied'):
              if key not in attention:
                  raise SystemExit(f'deployed PR3 field missing: {key}')

          receipt = {
              'schema_version': '1.0',
              'status': 'verified',
              'deployed_at': datetime.now(timezone.utc).replace(microsecond=0).isoformat(),
              'page_url': os.environ['PAGE_URL'],
              'source_commit': os.environ['GITHUB_SHA'],
              'asset_version': os.environ['EXPECTED_VERSION'],
              'contract_version': attention.get('contract_version'),
              'data_updated_at': attention.get('updated_at'),
              'catalyst_count': len(items),
              'technical_watch_count': len(technical_watch),
              'regulator_health': (health.get('regulators') or {}).get('status'),
              'production_smoke_passed': True,
          }
          Path('/tmp/deploy-receipt.json').write_text(
              json.dumps(receipt, ensure_ascii=False, indent=2) + '\n',
              encoding='utf-8',
          )
          print(f"Deployed PR3 verified: {len(items)} catalysts / {len(technical_watch)} technical watch")
          PY

      - name: Checkout main for deployment receipt
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Record verified production deployment
        shell: bash
        run: |
          set -euo pipefail
          cp /tmp/deploy-receipt.json .github/deploy-receipt.json
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/deploy-receipt.json
          if git diff --cached --quiet; then
            echo "Deployment receipt is unchanged."
            exit 0
          fi
          git commit -m "Record verified PR3 Pages deployment"
          git pull --rebase origin main
          git push origin HEAD:main
