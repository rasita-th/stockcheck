name: Deploy GitHub Pages

on:
  workflow_dispatch:
  push:
    branches: ["main"]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: stockcheck-pages-deploy
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Prepare stable Pages artifact
        run: |
          python -m py_compile scripts/prepare_stable_site_v9_4_1.py
          python scripts/prepare_stable_site_v9_4_1.py

      - name: Validate JavaScript entry points
        run: |
          node --check site/app.js
          node --check site/shared-app-shell-v9-3-6.js
          node --check site/runtime-guard-v9-4-1.js
          node --check site/market.js

      - name: Validate static data before deploy
        run: |
          python -m py_compile scripts/validate_static_data.py
          python scripts/validate_static_data.py

      - name: Verify required UI and data files
        run: |
          test -s site/index.html
          test -s site/styles.css
          test -s site/app.js
          test -s site/shared-app-shell-v9-3-6.css
          test -s site/shared-app-shell-v9-3-6.js
          test -s site/mobile-nav-v9-4-2.css
          test -s site/runtime-guard-v9-4-1.js
          test -s site/data/technical.json
          test -s site/data/fundamental.json
          grep -q 'app.js?v=9.4.5' site/index.html
          grep -q 'shared-app-shell-v9-3-6.css?v=9.4.5' site/index.html
          grep -q 'shared-app-shell-v9-3-6.js?v=9.4.5' site/index.html
          grep -q 'mobile-nav-v9-4-2.css?v=9.4.5' site/index.html
          grep -q 'runtime-guard-v9-4-1.js?v=9.4.5' site/index.html
          grep -q "Today" site/shared-app-shell-v9-3-6.js
          grep -q "Memo" site/shared-app-shell-v9-3-6.js
          if grep -Eq 'desktop-layout-v9-4-3|scanner-dashboard|scanner-layout-v9-3|shared-app-shell-v9-3-[34]|nav-fix-v9-2' site/index.html; then
            echo 'Unstable legacy asset still referenced by deployment artifact'
            exit 1
          fi

      - name: Add nojekyll marker
        run: touch site/.nojekyll

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
