name: Deploy GitHub Pages

on:
  workflow_dispatch:
  push:
    branches: ["main"]
    paths-ignore:
      - ".github/deploy-receipt.json"
  workflow_run:
    workflows: ["Refresh Market Pulse v9.6 (safe)"]
    types: [completed]

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: stockcheck-pages-deploy
  cancel-in-progress: true

env:
  TODAY_DEPLOY_VERSION: "10.5.3"

jobs:
  build:
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Prepare clean Pages artifact
        run: |
          python -m py_compile scripts/prepare_stable_site_v9_4_1.py scripts/sync_attention_assets.py
          python scripts/prepare_stable_site_v9_4_1.py
          python scripts/sync_attention_assets.py

      - name: Inject Logo.dev publishable token
        env:
          LOGO_DEV_TOKEN: ${{ secrets.LOGO_DEV }}
        run: |
          python - <<'PY'
          import os
          from pathlib import Path

          token = os.environ.get("LOGO_DEV_TOKEN", "").strip()
          if not token.startswith("pk_"):
              raise SystemExit("LOGO_DEV must contain a Logo.dev publishable key")
          placeholder = "__LOGO_DEV_PUBLISHABLE_KEY__"
          for relative in ("site/attention-pr4.js", "static/attention-pr4.js"):
              path = Path(relative)
              text = path.read_text(encoding="utf-8")
              if text.count(placeholder) != 1:
                  raise SystemExit(f"{relative}: Logo.dev placeholder count is not 1")
              path.write_text(text.replace(placeholder, token), encoding="utf-8")
          PY

      - name: Validate source artifact
        run: |
          node --check site/app.js
          node --check site/app-shell-v9-4-6.js
          node --check site/market.js
          node --check site/notification-phase2.js
          node --check site/final-ui-coordinator.js
          node --check site/memo-only-fix.js
          node --check site/attention-p0.js
          node --check site/attention-pr3.js
          node --check site/attention-pr4.js
          node --check site/earnings-radar-pr4.js
          python scripts/validate_static_data.py
          python scripts/validate_earnings_radar.py
          python scripts/smoke_test_site_v9_4_6.py
          python scripts/check_ui_view_contract.py
          python scripts/check_earnings_radar_ui_contract.py
          python scripts/check_earnings_radar_activation.py

      - name: Force production cache bust
        env:
          VERSION: ${{ env.TODAY_DEPLOY_VERSION }}
        run: |
          python - <<'PY'
          import os
          import re
          from pathlib import Path

          version = os.environ["VERSION"]
          pages = {
              Path("site/index.html"): (
                  "styles.css",
                  "app.js",
                  "notification-phase2.css",
                  "notification-phase2.js",
                  "final-ui-coordinator.css",
                  "final-ui-coordinator.js",
                  "memo-only-fix.css",
                  "memo-only-fix.js",
                  "app-shell-v9-4-6.css",
                  "app-shell-v9-4-6.js",
              ),
              Path("site/market.html"): (
                  "market.css",
                  "market.js",
                  "app-shell-v9-4-6.css",
              ),
          }
          for path, assets in pages.items():
              text = path.read_text(encoding="utf-8")
              for asset in assets:
                  text = re.sub(
                      rf"({re.escape(asset)})(?:\?[^\"']*)?",
                      rf"\1?v={version}",
                      text,
                      flags=re.IGNORECASE,
                  )
              path.write_text(text, encoding="utf-8")
          PY

      - name: Verify final PR4 Earnings Radar artifact
        shell: bash
        run: |
          set -euo pipefail
          test -s site/index.html
          test -s site/attention-p0.js
          test -s site/attention-p0.css
          test -s site/attention-pr3.js
          test -s site/attention-pr3.css
          test -s site/attention-pr4.js
          test -s site/attention-pr4.css
          test -s site/earnings-radar-pr4.js
          test -s site/earnings-radar-pr4.css
          test -s site/memo-only-fix.js
          test -s site/memo-only-fix.css
          test -s site/today-view-isolation.css
          test -s site/data/attention_today.json
          test -s site/data/earnings_radar.json
          grep -Fq "memo-only-fix.js?v=${TODAY_DEPLOY_VERSION}" site/index.html
          grep -Fq "memo-only-fix.css?v=${TODAY_DEPLOY_VERSION}" site/index.html
          grep -Fq 'attention-p0.js?v=10.2.0' site/memo-only-fix.js
          grep -Fq 'attention-pr3.js?v=10.3.0' site/memo-only-fix.js
          grep -Fq 'attention-pr4.js?v=10.4.1' site/memo-only-fix.js
          grep -Fq 'earnings-radar-pr4.js?v=10.5.1' site/memo-only-fix.js
          grep -Fq 'attention-p0.css?v=10.2.0' site/memo-only-fix.css
          grep -Fq 'today-view-isolation.css?v=10.2.2' site/memo-only-fix.css
          grep -Fq 'attention-pr3.css?v=10.3.0' site/memo-only-fix.css
          grep -Fq 'attention-pr4.css?v=10.4.2' site/memo-only-fix.css
          grep -Fq 'earnings-radar-pr4.css?v=10.5.1' site/memo-only-fix.css
          grep -Fq 'PR4 · DECISION-FIRST TODAY' site/attention-pr4.js
          grep -Fq 'StockcheckAttentionP4' site/attention-pr4.js
          grep -Fq 'StockcheckEarningsRadarP4' site/earnings-radar-pr4.js
          grep -Fq 'Earnings Radar' site/earnings-radar-pr4.js
          grep -Fq 'Earnings Calendar' site/earnings-radar-pr4.js
          grep -Fq 'data-er-date-input' site/earnings-radar-pr4.js
          grep -Fq 'data-er-export' site/earnings-radar-pr4.js
          grep -Fq 'er-relation-portfolio' site/earnings-radar-pr4.css
          if grep -Fq 'Unverified report' site/attention-pr4.js; then
            echo 'Legacy English verification UI remains in PR4 renderer'
            exit 1
          fi
          if grep -Fq 'technical_json' site/attention-pr4.js; then
            echo 'Internal technical source is exposed in PR4 renderer'
            exit 1
          fi
          if grep -Fq '327 / 408' site/earnings-radar-pr4.js || grep -Fq '>146<' site/earnings-radar-pr4.js; then
            echo 'Mockup earnings values are hard-coded in the production renderer'
            exit 1
          fi

      - name: Add nojekyll marker
        run: touch site/.nojekyll

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 18
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Smoke test deployed PR4 Earnings Radar
        shell: bash
        env:
          PAGE_URL: ${{ steps.deployment.outputs.page_url }}
          EXPECTED_VERSION: ${{ env.TODAY_DEPLOY_VERSION }}
        run: |
          set -euo pipefail
          BASE="${PAGE_URL%/}"
          test -n "$BASE"

          fetch_and_check_ui() {
            local nonce="$1"
            curl -fsSL --retry 2 --connect-timeout 10 --max-time 30 "${BASE}/index.html?smoke=${nonce}" -o /tmp/index.html || return 1
            curl -fsSL --retry 2 --connect-timeout 10 --max-time 30 "${BASE}/memo-only-fix.js?smoke=${nonce}" -o /tmp/memo-only-fix.js || return 1
            curl -fsSL --retry 2 --connect-timeout 10 --max-time 30 "${BASE}/final-ui-coordinator.js?smoke=${nonce}" -o /tmp/final-ui-coordinator.js || return 1
            curl -fsSL --retry 2 --connect-timeout 10 --max-time 30 "${BASE}/final-ui-coordinator.css?smoke=${nonce}" -o /tmp/final-ui-coordinator.css || return 1
            curl -fsSL --retry 2 --connect-timeout 10 --max-time 30 "${BASE}/memo-only-fix.css?smoke=${nonce}" -o /tmp/memo-only-fix.css || return 1
            curl -fsSL --retry 2 --connect-timeout 10 --max-time 30 "${BASE}/attention-pr4.js?smoke=${nonce}" -o /tmp/attention-pr4.js || return 1
            curl -fsSL --retry 2 --connect-timeout 10 --max-time 30 "${BASE}/attention-pr4.css?smoke=${nonce}" -o /tmp/attention-pr4.css || return 1
            curl -fsSL --retry 2 --connect-timeout 10 --max-time 30 "${BASE}/earnings-radar-pr4.js?smoke=${nonce}" -o /tmp/earnings-radar-pr4.js || return 1
            curl -fsSL --retry 2 --connect-timeout 10 --max-time 30 "${BASE}/earnings-radar-pr4.css?smoke=${nonce}" -o /tmp/earnings-radar-pr4.css || return 1
            curl -fsSL --retry 2 --connect-timeout 10 --max-time 30 "${BASE}/today-view-isolation.css?smoke=${nonce}" -o /tmp/today-view-isolation.css || return 1
            curl -fsSL --retry 2 --connect-timeout 10 --max-time 30 "${BASE}/data/attention_today.json?smoke=${nonce}" -o /tmp/attention_today.json || return 1
            curl -fsSL --retry 2 --connect-timeout 10 --max-time 30 "${BASE}/data/earnings_radar.json?smoke=${nonce}" -o /tmp/earnings_radar.json || return 1
            curl -fsSL --retry 2 --connect-timeout 10 --max-time 30 "${BASE}/market.html?smoke=${nonce}" -o /tmp/market.html || return 1
            curl -fsSL --retry 2 --connect-timeout 10 --max-time 30 "${BASE}/market.js?smoke=${nonce}" -o /tmp/market.js || return 1

            grep -Fq "memo-only-fix.js?v=${EXPECTED_VERSION}" /tmp/index.html || return 1
            grep -Fq "memo-only-fix.css?v=${EXPECTED_VERSION}" /tmp/index.html || return 1
            grep -Fq 'attention-pr4.js?v=10.4.1' /tmp/memo-only-fix.js || return 1
            grep -Fq 'earnings-radar-pr4.js?v=10.5.1' /tmp/memo-only-fix.js || return 1
            grep -Fq 'attention-pr4.css?v=10.4.2' /tmp/memo-only-fix.css || return 1
            grep -Fq 'earnings-radar-pr4.css?v=10.5.1' /tmp/memo-only-fix.css || return 1
            grep -Fq 'PR4 · DECISION-FIRST TODAY' /tmp/attention-pr4.js || return 1
            grep -Fq 'StockcheckAttentionP4' /tmp/attention-pr4.js || return 1
            grep -Fq 'StockcheckEarningsRadarP4' /tmp/earnings-radar-pr4.js || return 1
            grep -Fq 'data-er-date-input' /tmp/earnings-radar-pr4.js || return 1
            grep -Fq 'data-er-export' /tmp/earnings-radar-pr4.js || return 1
            grep -Fq 'er-relation-portfolio' /tmp/earnings-radar-pr4.css || return 1
            grep -Fq 'body.attention-active .workspace' /tmp/today-view-isolation.css || return 1
            grep -Fq 'body.attention-active .decision-screener' /tmp/today-view-isolation.css || return 1
          grep -Fq 'body.attention-active.attention-p4-ready #attentionPageP4' /tmp/today-view-isolation.css || return 1
          grep -Fq 'img.logo.dev/ticker/' /tmp/attention-pr4.js || return 1
          grep -Fq 'syncStockDetailLogos' /tmp/final-ui-coordinator.js || return 1
          grep -Fq 'StockcheckCompanyLogo' /tmp/final-ui-coordinator.js || return 1
          grep -Fq '.stock-detail-company-logo' /tmp/final-ui-coordinator.css || return 1
          grep -Fq 'fallback=404' /tmp/attention-pr4.js || return 1
            grep -Fq 'id="marketBriefing"' /tmp/market.html || return 1
            grep -Fq 'normaliseNarrative' /tmp/market.js || return 1
            ! grep -Fq 'Unverified report' /tmp/attention-pr4.js || return 1
            ! grep -Fq 'technical_json' /tmp/attention-pr4.js || return 1
          }

          ready=false
          for attempt in $(seq 1 30); do
            nonce="$(date +%s)-${attempt}"
            echo "Production PR4 Earnings Radar smoke attempt ${attempt}: ${BASE}"
            if fetch_and_check_ui "$nonce"; then
              ready=true
              break
            fi
            sleep 5
          done
          if [ "$ready" != "true" ]; then
            echo 'GitHub Pages did not serve the PR4 Earnings Radar workflow'
            exit 1
          fi

          python - <<'PY'
          import json
          import os
          from datetime import datetime, timezone
          from pathlib import Path

          attention = json.loads(Path('/tmp/attention_today.json').read_text(encoding='utf-8'))
          radar = json.loads(Path('/tmp/earnings_radar.json').read_text(encoding='utf-8'))
          if not isinstance(attention, dict) or not str(attention.get('contract_version') or '').startswith('3.0'):
              raise SystemExit('deployed Today data contract is not PR3 3.0 compatible')
          items = attention.get('items')
          technical_watch = attention.get('technical_watch')
          if not isinstance(items, list) or not isinstance(technical_watch, list):
              raise SystemExit('deployed Today sections are missing')
          if not isinstance(radar, dict) or not str(radar.get('schema_version') or '').startswith('1.0'):
              raise SystemExit('deployed Earnings Radar schema is not 1.0')
          radar_items = radar.get('items')
          daily_summary = radar.get('daily_summary')
          window = radar.get('window') if isinstance(radar.get('window'), dict) else {}
          coverage = radar.get('coverage') if isinstance(radar.get('coverage'), dict) else {}
          if not isinstance(radar_items, list) or not isinstance(daily_summary, list):
              raise SystemExit('deployed Earnings Radar rows are missing')
          if int(window.get('days_forward') or 0) < 45:
              raise SystemExit('deployed Earnings Radar does not cover 45 days')
          if int(coverage.get('market_source_rows') or 0) <= int(coverage.get('portfolio_total') or 0):
              raise SystemExit('deployed Earnings Radar is not market-wide')
          for item in items:
              events = item.get('events') if isinstance(item, dict) else None
              if not isinstance(events, list) or not any(event.get('event_type') != 'technical' for event in events):
                  raise SystemExit('technical-only item leaked into deployed main catalysts')
          for item in technical_watch:
              events = item.get('events') if isinstance(item, dict) else None
              if not isinstance(events, list) or not events or any(event.get('event_type') != 'technical' for event in events):
                  raise SystemExit('deployed technical watch contains a non-technical event')
          health = attention.get('source_health') if isinstance(attention.get('source_health'), dict) else {}
          selected_date = str(radar.get('selected_date') or '')
          selected_summary = next((row for row in daily_summary if row.get('date') == selected_date), {})

          receipt = {
              'schema_version': '1.0',
              'status': 'verified',
              'deployed_at': datetime.now(timezone.utc).replace(microsecond=0).isoformat(),
              'page_url': os.environ['PAGE_URL'],
              'source_commit': os.environ['GITHUB_SHA'],
              'asset_version': os.environ['EXPECTED_VERSION'],
              'ui_runtime': 'PR4 decision-first hierarchy + Earnings Radar',
              'contract_version': attention.get('contract_version'),
              'data_updated_at': attention.get('updated_at'),
              'catalyst_count': len(items),
              'technical_watch_count': len(technical_watch),
              'regulator_health': (health.get('regulators') or {}).get('status'),
              'earnings_radar_schema': radar.get('schema_version'),
              'earnings_selected_date': selected_date,
              'earnings_selected_date_total': int(selected_summary.get('total') or 0),
              'earnings_published_rows': int(coverage.get('published_rows') or 0),
              'earnings_market_source_rows': int(coverage.get('market_source_rows') or 0),
              'earnings_window_days_forward': int(window.get('days_forward') or 0),
              'production_smoke_passed': True,
          }
          Path('/tmp/deploy-receipt.json').write_text(
              json.dumps(receipt, ensure_ascii=False, indent=2) + '\n',
              encoding='utf-8',
          )
          print(
              f"Deployed PR4 Earnings Radar verified: {len(items)} catalysts / "
              f"{len(technical_watch)} technical watch / {len(radar_items)} earnings rows"
          )
          PY

      - name: Checkout main for deployment receipt
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Record verified production deployment
        shell: bash
        run: |
          set -euo pipefail
          cp /tmp/deploy-receipt.json .github/deploy-receipt.json
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/deploy-receipt.json
          if git diff --cached --quiet; then
            echo "Deployment receipt is unchanged."
            exit 0
          fi
          git commit -m "Record verified PR4 Earnings Radar deployment"
          git pull --rebase origin main
          git push origin HEAD:main

