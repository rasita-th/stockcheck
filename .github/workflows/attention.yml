name: Generate Attention List

on:
  workflow_dispatch:
  schedule:
    # After US market close, roughly 08:00 Bangkok / 01:00 UTC.
    - cron: "0 1 * * 1-5"

permissions:
  contents: write

concurrency:
  group: stockcheck-generated-data
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Sync latest main before generating
        run: |
          git fetch origin main
          git checkout main
          git reset --hard origin/main

      - name: Refresh technical layer for attention sync
        env:
          INCLUDE_FUNDAMENTALS: "0"
          TECHNICAL_RANGE: "1y"
          TECHNICAL_INTERVAL: "1d"
          TECHNICAL_SCAN_WORKERS: "8"
        run: python scripts/update_technical_data.py

      - name: Generate attention_today.json
        env:
          SEC_USER_AGENT: "Stock Timing Radar GitHub Action contact@users.noreply.github.com"
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
        run: python scripts/generate_attention_finnhub.py

      - name: Generate recommendation_trends.json
        env:
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
        run: python scripts/generate_recommendation_trends.py

      - name: Resolve latest fundamental data
        env:
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
        run: python scripts/generate_fundamental_resolver.py

      - name: Generate eps_surprises.json
        env:
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
        run: python scripts/generate_eps_surprises.py

      - name: Validate attention/scanner data consistency
        run: python scripts/validate_static_data.py

      - name: Commit updated generated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          echo "Changed files before commit:"
          git status --short

          mkdir -p /tmp/stockcheck-generated
          rm -rf /tmp/stockcheck-generated/data /tmp/stockcheck-generated/site-data /tmp/stockcheck-generated/static-data
          cp -a data /tmp/stockcheck-generated/data
          cp -a site/data /tmp/stockcheck-generated/site-data
          cp -a static/data /tmp/stockcheck-generated/static-data

          # Generated JSON files are intentionally overwritten by the latest run.
          # Avoid rebasing a generated-data commit over newer generated-data
          # commits, because that creates pointless conflicts in JSON outputs.
          git fetch origin main
          git reset --hard origin/main
          rm -rf data site/data static/data
          cp -a /tmp/stockcheck-generated/data data
          mkdir -p site static
          cp -a /tmp/stockcheck-generated/site-data site/data
          cp -a /tmp/stockcheck-generated/static-data static/data

          git add -A data site/data static/data

          if git diff --cached --quiet; then
            echo "No generated data changes to commit."
            exit 0
          fi

          git commit -m "Update generated stock radar data"
          git push origin HEAD:main
