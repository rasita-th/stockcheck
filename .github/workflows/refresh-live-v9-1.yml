name: Refresh Live Data v10 P0

on:
  workflow_dispatch:
  schedule:
    - cron: "*/15 * * * 1-5"
    - cron: "17 */2 * * 0,6"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: stockcheck-v10-live
  cancel-in-progress: true

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check refresh windows
        id: window
        run: |
          python - <<'PY' >> "$GITHUB_OUTPUT"
          from datetime import datetime, time
          from zoneinfo import ZoneInfo
          now = datetime.now(ZoneInfo("America/New_York"))
          weekday = now.weekday() < 5
          market_open = weekday and time(9, 25) <= now.time() <= time(16, 20)
          event_open = (weekday and time(6, 0) <= now.time() <= time(21, 0)) or not weekday
          print(f"market_open={'true' if market_open else 'false'}")
          print(f"event_open={'true' if event_open else 'false'}")
          print(f"now={now.isoformat()}")
          PY

      - name: Skip outside event window
        if: steps.window.outputs.event_open != 'true' && github.event_name != 'workflow_dispatch'
        run: echo "Outside event window at ${{ steps.window.outputs.now }}"

      - uses: actions/checkout@v4
        if: steps.window.outputs.event_open == 'true' || github.event_name == 'workflow_dispatch'
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        if: steps.window.outputs.event_open == 'true' || github.event_name == 'workflow_dispatch'
        with:
          python-version: "3.13"

      - name: Install dependencies
        if: steps.window.outputs.event_open == 'true' || github.event_name == 'workflow_dispatch'
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Seed canonical generated layer
        if: steps.window.outputs.event_open == 'true' || github.event_name == 'workflow_dispatch'
        run: python scripts/build_generated_layer.py

      - name: Refresh latest quotes
        if: steps.window.outputs.market_open == 'true' || github.event_name == 'workflow_dispatch'
        run: python scripts/update_quote_data.py

      - name: Refresh technical layer
        if: steps.window.outputs.market_open == 'true' || github.event_name == 'workflow_dispatch'
        env:
          INCLUDE_FUNDAMENTALS: "0"
          TECHNICAL_RANGE: "1y"
          TECHNICAL_INTERVAL: "1d"
          TECHNICAL_SCAN_WORKERS: "8"
        run: |
          python scripts/update_technical_data.py
          cp site/data/technical.json data/generated/technical.json
          cp site/data/scanner.json data/generated/scanner.json

      - name: Refresh event-first Today attention
        if: steps.window.outputs.event_open == 'true' || github.event_name == 'workflow_dispatch'
        env:
          SEC_USER_AGENT: "Stock Timing Radar GitHub Action contact@users.noreply.github.com"
          ATTENTION_MAX_ITEMS: "7"
          SEC_BOOTSTRAP_DAYS: "1"
        run: python scripts/generate_attention_p0.py

      - name: Run attention unit tests
        if: steps.window.outputs.event_open == 'true' || github.event_name == 'workflow_dispatch'
        run: python -m unittest discover -s tests -p "test_attention_p0.py" -v

      - name: Generate health and publish
        if: steps.window.outputs.event_open == 'true' || github.event_name == 'workflow_dispatch'
        run: |
          python scripts/test_publish_generated_data.py
          python scripts/generate_health.py
          python scripts/publish_generated_data.py
          python scripts/validate_generated_data_v9_1.py
          python scripts/check_ui_view_contract.py

      - name: Commit canonical generated data
        if: steps.window.outputs.event_open == 'true' || github.event_name == 'workflow_dispatch'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/generated data/source_state site/data static/data
          git reset -- data/generated/market_pulse.json site/data/market_pulse.json static/data/market_pulse.json 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No data changes."
            exit 0
          fi
          git commit -m "Refresh event-first attention data"
          git push origin HEAD:main
