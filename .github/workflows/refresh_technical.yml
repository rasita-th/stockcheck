name: Refresh Technical Prices

on:
  workflow_dispatch:
  schedule:
    # Fast price/technical refresh during broad US market window.
    # GitHub schedules are UTC and can be delayed.
    - cron: "*/15 13-22 * * 1-5"

permissions:
  contents: write

concurrency:
  group: stockcheck-fast-generated-data
  cancel-in-progress: true

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Sync latest main before refresh
        run: |
          git fetch origin main
          git checkout main
          git reset --hard origin/main

      - name: Generate technical data only
        env:
          INCLUDE_FUNDAMENTALS: "0"
          TECHNICAL_RANGE: "1y"
          TECHNICAL_INTERVAL: "1d"
          TECHNICAL_SCAN_WORKERS: "8"
        run: python scripts/update_technical_data.py

      - name: Refresh attention from latest technical data
        env:
          SEC_USER_AGENT: "Stock Timing Radar GitHub Action contact@users.noreply.github.com"
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
        run: python scripts/generate_attention_finnhub.py

      - name: Validate static data
        run: python scripts/validate_static_data.py

      - name: Commit fast data only
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          mkdir -p /tmp/stockcheck-generated
          rm -rf /tmp/stockcheck-generated/data /tmp/stockcheck-generated/site-data /tmp/stockcheck-generated/static-data
          cp -a data /tmp/stockcheck-generated/data
          cp -a site/data /tmp/stockcheck-generated/site-data
          cp -a static/data /tmp/stockcheck-generated/static-data

          git fetch origin main
          git reset --hard origin/main

          for f in technical.json scanner.json attention_today.json; do
            [ -f "/tmp/stockcheck-generated/data/$f" ] && cp "/tmp/stockcheck-generated/data/$f" "data/$f"
            [ -f "/tmp/stockcheck-generated/site-data/$f" ] && cp "/tmp/stockcheck-generated/site-data/$f" "site/data/$f"
            [ -f "/tmp/stockcheck-generated/static-data/$f" ] && cp "/tmp/stockcheck-generated/static-data/$f" "static/data/$f"
          done

          for f in \
            data/technical.json data/scanner.json data/attention_today.json \
            site/data/technical.json site/data/scanner.json site/data/attention_today.json \
            static/data/technical.json static/data/scanner.json static/data/attention_today.json; do
            if [ -e "$f" ]; then
              git add "$f"
            else
              echo "Skip missing generated file: $f"
            fi
          done

          if git diff --cached --quiet; then
            echo "No fast data changes."
            exit 0
          fi

          git commit -m "Refresh technical prices and attention"
          git push origin HEAD:main
