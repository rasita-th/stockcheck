name: Validate Earnings Radar UI

on:
  pull_request:
    paths:
      - ".github/workflows/validate-earnings-radar-ui.yml"
      - ".github/workflows/refresh_finnhub_events.yml"
      - ".github/workflows/deploy-pages.yml"
      - "scripts/generate_earnings_radar.py"
      - "scripts/harden_earnings_radar.py"
      - "scripts/validate_earnings_radar.py"
      - "scripts/check_earnings_radar_ui_contract.py"
      - "scripts/check_earnings_radar_activation.py"
      - "scripts/sync_attention_assets.py"
      - "scripts/prepare_stable_site_v9_4_1.py"
      - "scripts/preflight.sh"
      - "tests/test_earnings_radar.py"
      - "tests/test_earnings_radar_hardening.py"
      - "data/earnings_relevance.json"
      - "site/earnings-radar-pr4.*"
      - "site/earnings-radar-error-guard.js"
      - "static/earnings-radar-pr4.*"
      - "static/earnings-radar-error-guard.js"
      - "site/memo-only-fix.*"
      - "static/memo-only-fix.*"
      - "site/data/earnings_radar.json"
      - "static/data/earnings_radar.json"
  push:
    branches: ["main"]
    paths:
      - "scripts/generate_earnings_radar.py"
      - "scripts/harden_earnings_radar.py"
      - "scripts/validate_earnings_radar.py"
      - "scripts/check_earnings_radar_ui_contract.py"
      - "scripts/check_earnings_radar_activation.py"
      - "site/earnings-radar-pr4.*"
      - "site/earnings-radar-error-guard.js"
      - "static/earnings-radar-pr4.*"
      - "static/earnings-radar-error-guard.js"
      - "site/memo-only-fix.*"
      - ".github/workflows/deploy-pages.yml"

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Compile generators and validators
        run: |
          python -m py_compile \
            scripts/generate_earnings_radar.py \
            scripts/harden_earnings_radar.py \
            scripts/validate_earnings_radar.py \
            scripts/check_earnings_radar_ui_contract.py \
            scripts/check_earnings_radar_activation.py \
            scripts/sync_attention_assets.py \
            scripts/prepare_stable_site_v9_4_1.py
      - name: Test earnings radar data and hardening contracts
        run: |
          python -m unittest tests.test_earnings_radar -v
          python -m unittest tests.test_earnings_radar_hardening -v
      - name: Generate and harden 45-day radar fixture
        env:
          EARNINGS_RADAR_DAYS_BACK: "1"
          EARNINGS_RADAR_DAYS_FORWARD: "45"
        run: |
          python scripts/generate_earnings_radar.py
          python scripts/harden_earnings_radar.py --write
      - name: Sync runtime assets in clean checkout
        run: python scripts/sync_attention_assets.py
      - name: Validate JavaScript, schema, UI and activation contracts
        run: |
          node --check site/memo-only-fix.js
          node --check site/earnings-radar-pr4.js
          node --check site/earnings-radar-error-guard.js
          python scripts/validate_earnings_radar.py
          python scripts/harden_earnings_radar.py
          python scripts/check_earnings_radar_ui_contract.py
          python scripts/check_earnings_radar_activation.py
      - name: Run production-equivalent preparation
        run: |
          python scripts/prepare_stable_site_v9_4_1.py
          python scripts/sync_attention_assets.py
          python scripts/harden_earnings_radar.py
          python scripts/check_ui_view_contract.py
