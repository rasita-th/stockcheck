name: Generate Fundamental Resolver

on:
  workflow_dispatch:
  schedule:
    - cron: "30 1 * * 1-5"

permissions:
  contents: write

jobs:
  resolve:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
      - name: Resolve latest fundamental data
        env:
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
        run: python scripts/generate_fundamental_resolver.py
      - name: Commit resolved fundamental data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A data site/data static/data
          if git diff --cached --quiet; then echo "No fundamental resolver changes."; exit 0; fi
          git commit -m "Update resolved fundamental data"
          git pull --rebase --autostash origin main
          git push origin HEAD:main
