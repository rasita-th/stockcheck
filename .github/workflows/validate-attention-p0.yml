name: Validate Today Attention PR4

on:
  pull_request:
    paths:
      - ".github/workflows/refresh-live-v9-1.yml"
      - ".github/workflows/validate-attention-p0.yml"
      - ".github/workflows/deploy-pages.yml"
      - ".github/workflows/deploy-pages-after-pr3.yml"
      - "scripts/generate_attention_p0.py"
      - "scripts/generate_attention_pr2.py"
      - "scripts/generate_attention_pr3.py"
      - "scripts/attention_pr3.py"
      - "scripts/attention_sources/**"
      - "scripts/sync_attention_assets.py"
      - "scripts/build_generated_layer.py"
      - "scripts/generate_health.py"
      - "scripts/validate_generated_data_v9_1.py"
      - "scripts/validate_attention_pr2.py"
      - "scripts/validate_attention_pr3.py"
      - "scripts/validate_static_data.py"
      - "scripts/smoke_test_site_v9_4_6.py"
      - "scripts/prepare_stable_site_v9_4_1.py"
      - "scripts/check_ui_view_contract.py"
      - "tests/test_attention_p0.py"
      - "tests/test_attention_news.py"
      - "tests/test_attention_pr3.py"
      - "tests/fixtures/attention_news/**"
      - "tests/golden/attention_today_v2_0.json"
      - "data/portfolio.json"
      - "data/earnings_calendar.json"
      - "data/source_registry.json"
      - "data/regulator_sources.json"
      - "data/attention_preferences.json"
      - "data/source_state/news.json"
      - "site/attention-p0.*"
      - "site/attention-pr3.*"
      - "site/attention-pr4.*"
      - "static/attention-p0.*"
      - "static/attention-pr3.*"
      - "static/attention-pr4.*"
      - "site/today-view-isolation.css"
      - "static/today-view-isolation.css"
      - "site/memo-only-fix.*"
      - "static/memo-only-fix.*"
      - "site/data/attention_today.json"
      - "site/data/earnings_calendar.json"
      - "static/data/attention_today.json"
      - "static/data/earnings_calendar.json"

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Compile attention and Pages scripts
        run: |
          python -m py_compile scripts/generate_attention_p0.py
          python -m py_compile scripts/generate_attention_pr2.py
          python -m py_compile scripts/generate_attention_pr3.py
          python -m py_compile scripts/attention_pr3.py
          python -m py_compile scripts/attention_sources/*.py
          python -m py_compile scripts/sync_attention_assets.py
          python -m py_compile scripts/generate_health.py
          python -m py_compile scripts/validate_generated_data_v9_1.py
          python -m py_compile scripts/validate_attention_pr2.py
          python -m py_compile scripts/validate_attention_pr3.py
          python -m py_compile scripts/validate_static_data.py
          python -m py_compile scripts/smoke_test_site_v9_4_6.py
          python -m py_compile scripts/prepare_stable_site_v9_4_1.py
      - name: Run attention unit tests
        run: |
          python -m unittest discover -s tests -p "test_attention_p0.py" -v
          python -m unittest discover -s tests -p "test_attention_news.py" -v
          python -m unittest discover -s tests -p "test_attention_pr3.py" -v
      - name: Build offline PR3 attention fixture
        env:
          STOCKCHECK_ATTENTION_OFFLINE: "1"
          ATTENTION_NEWS_ENABLED: "0"
          ATTENTION_REGULATORS_ENABLED: "0"
          ATTENTION_MAX_ITEMS: "7"
        run: python scripts/generate_attention_pr3.py
      - name: Sync Today runtime assets
        run: python scripts/sync_attention_assets.py
      - name: Validate generated schema and UI isolation
        run: |
          python scripts/build_generated_layer.py
          python scripts/generate_health.py
          python scripts/publish_generated_data.py
          python scripts/validate_generated_data_v9_1.py
          python scripts/validate_attention_pr2.py
          python scripts/validate_attention_pr3.py
          python scripts/check_ui_view_contract.py
      - name: Run the production Pages preflight
        run: |
          python scripts/prepare_stable_site_v9_4_1.py
          node --check site/app.js
          node --check site/app-shell-v9-4-6.js
          node --check site/attention-p0.js
          node --check site/attention-pr3.js
          node --check site/attention-pr4.js
          node --check site/memo-only-fix.js
          test -s site/today-view-isolation.css
          test -s site/attention-pr3.css
          test -s site/attention-pr4.css
          python scripts/validate_static_data.py
          python scripts/smoke_test_site_v9_4_6.py
          python scripts/check_ui_view_contract.py
