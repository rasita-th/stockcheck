name: Refresh Finnhub Earnings Events

on:
  workflow_dispatch:
  push:
    branches: ["main"]
    paths:
      - "scripts/run_finnhub_free_tier.py"
      - "scripts/finnhub_pipeline.py"
      - ".github/workflows/refresh_finnhub_events.yml"
      - ".github/refresh-finnhub-now"
  schedule:
    # Batch calendar plus priority earnings queue every 3 hours.
    - cron: "17 */3 * * *"

permissions:
  contents: write

# Share the PR3 publisher lock so an event refresh cannot overwrite a live Today run.
concurrency:
  group: stockcheck-v10-live-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Seed canonical generated layer
        run: python scripts/build_generated_layer.py

      - name: Refresh free-tier Finnhub events with key A
        env:
          FINNHUB_API_KEY_EVENTS: ${{ secrets.FINNHUB_API_KEY_EVENTS || secrets.FINNHUB_API_KEY }}
          FINNHUB_EVENTS_MAX_CALLS_PER_RUN: "48"
          FINNHUB_CALENDAR_TTL_HOURS: "3"
          FINNHUB_MIN_DELAY_SECONDS: "1.25"
        run: python scripts/run_finnhub_free_tier.py --mode events

      - name: Promote Finnhub contracts to canonical generated data
        run: |
          mkdir -p data/generated
          cp data/earnings_calendar.json data/generated/earnings_calendar.json
          cp data/eps_surprises.json data/generated/eps_surprises.json
          cp data/finnhub_features.json data/generated/finnhub_features.json

      - name: Regenerate PR3 Today from refreshed earnings
        env:
          SEC_USER_AGENT: "Stock Timing Radar GitHub Action contact@users.noreply.github.com"
          ATTENTION_NEWS_USER_AGENT: "Stock Timing Radar GitHub Action contact@users.noreply.github.com"
          ATTENTION_NEWS_ENABLED: "1"
          ATTENTION_REGULATORS_ENABLED: "1"
          ATTENTION_NEWS_BATCH_SIZE: "10"
          ATTENTION_MAX_ITEMS: "7"
          SEC_BOOTSTRAP_DAYS: "1"
        run: python scripts/generate_attention_pr3.py

      - name: Test and publish generated contracts
        run: |
          python -m py_compile scripts/run_finnhub_free_tier.py
          python -m unittest tests.test_finnhub_pipeline tests.test_finnhub_free_tier
          python -m unittest discover -s tests -p "test_attention_p0.py" -v
          python -m unittest discover -s tests -p "test_attention_pr3.py" -v
          python scripts/test_publish_generated_data.py
          python scripts/generate_health.py
          python scripts/publish_generated_data.py
          python scripts/validate_generated_data_v9_1.py
          python scripts/validate_attention_pr3.py
          python scripts/validate_static_data.py
          python scripts/check_ui_view_contract.py

      - name: Publish Finnhub and Today contracts safely
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add data/finnhub data/earnings_calendar.json data/eps_surprises.json data/finnhub_features.json
          git add data/generated data/source_state site/data static/data
          git reset -- data/generated/market_pulse.json site/data/market_pulse.json static/data/market_pulse.json 2>/dev/null || true

          if git diff --cached --quiet; then
            echo "No Finnhub or Today data changes."
            exit 0
          fi

          git commit -m "Refresh Finnhub earnings and Today data"

          # Tests and generators may leave untracked caches. Clean them before
          # rebasing so Pages receipt commits cannot make git pull fail.
          git reset --hard HEAD
          git clean -fd
          test -z "$(git status --porcelain)"

          for attempt in 1 2 3; do
            git fetch origin main
            if ! git rebase origin/main; then
              git rebase --abort 2>/dev/null || true
              echo "Rebase failed on attempt ${attempt}."
              exit 1
            fi
            if git push origin HEAD:main; then
              echo "Finnhub and Today data pushed on attempt ${attempt}."
              exit 0
            fi
            echo "Push race on attempt ${attempt}; retrying."
            sleep $((attempt * 3))
          done

          echo "Unable to publish Finnhub and Today data after three attempts."
          exit 1
