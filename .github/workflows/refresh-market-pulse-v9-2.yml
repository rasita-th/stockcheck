name: Refresh Market Pulse v9.2 (safe)

on:
  workflow_dispatch:
  schedule:
    - cron: "20 22 * * 1-5"
  push:
    branches: [main]
    paths:
      - "scripts/generate_market_pulse.py"
      - "scripts/validate_market_pulse.py"
      - "data/market_universe.json"
      - ".github/workflows/refresh-market-pulse-v9-2.yml"

permissions:
  contents: write
  actions: read

concurrency:
  group: market-pulse-production
  cancel-in-progress: true

env:
  PYTHONUNBUFFERED: "1"

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install data dependencies
        run: python -m pip install --upgrade pip pandas yfinance

      - name: Backup last-known-good JSON
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p .deploy-backup
          for f in data/market_pulse.json site/data/market_pulse.json static/data/market_pulse.json; do
            [ -f "$f" ] && cp --parents "$f" .deploy-backup/
          done

      - name: Upload pre-refresh backup
        uses: actions/upload-artifact@v4
        with:
          name: market-pulse-backup-${{ github.run_number }}
          path: .deploy-backup
          if-no-files-found: warn
          retention-days: 30

      - name: Generate candidate JSON
        run: python scripts/generate_market_pulse.py

      - name: Validate candidate
        run: |
          python scripts/validate_market_pulse.py data/market_pulse.json --min-ok-rate 0.75
          cmp data/market_pulse.json site/data/market_pulse.json
          cmp data/market_pulse.json static/data/market_pulse.json

      - name: Upload validated candidate
        uses: actions/upload-artifact@v4
        with:
          name: market-pulse-candidate-${{ github.run_number }}
          path: |
            data/market_pulse.json
            site/data/market_pulse.json
            static/data/market_pulse.json
          retention-days: 30

      - name: Commit validated data only
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/market_pulse.json site/data/market_pulse.json static/data/market_pulse.json
          if git diff --cached --quiet; then
            echo "No data changes"
            exit 0
          fi
          git commit -m "data: refresh validated Market Pulse"
          git pull --rebase origin main
          git push origin HEAD:main
