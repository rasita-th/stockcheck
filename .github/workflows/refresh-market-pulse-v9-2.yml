name: Refresh Market Pulse v9.2

on:
  workflow_dispatch:
  schedule:
    - cron: "20 22 * * 1-5"
  push:
    branches: [main]
    paths:
      - "scripts/generate_market_pulse.py"
      - "data/market_universe.json"
      - ".github/workflows/refresh-market-pulse-v9-2.yml"

permissions:
  contents: write

concurrency:
  group: refresh-market-pulse-v9-2
  cancel-in-progress: true

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install data dependencies
        run: python -m pip install --upgrade pip pandas yfinance
      - name: Generate Market Pulse JSON
        run: python scripts/generate_market_pulse.py
      - name: Validate v9.2 schema
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          p=Path('data/market_pulse.json')
          d=json.loads(p.read_text(encoding='utf-8'))
          required=('global_markets','us_indices','us_sectors','themes')
          missing=[k for k in required if not isinstance(d.get(k),list) or not d[k]]
          if missing:
              raise SystemExit(f'Missing or empty required datasets: {missing}')
          print({k:len(d[k]) for k in required})
          PY
      - name: Commit refreshed data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/market_pulse.json site/data/market_pulse.json static/data/market_pulse.json
          git diff --cached --quiet && exit 0
          git commit -m "data: refresh Market Pulse"
          git push
