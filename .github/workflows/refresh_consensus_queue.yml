name: Refresh Analyst Consensus Queue

on:
  workflow_dispatch:
  schedule:
    - cron: "*/15 * * * *"

permissions:
  contents: write

concurrency:
  group: stockcheck-consensus-queue
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Sync latest main
        run: |
          git fetch origin main
          git checkout main
          git reset --hard origin/main
      - name: Refresh a small consensus batch
        env:
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
          ANALYST_CONSENSUS_MAX_CALLS_PER_RUN: "2"
          ANALYST_CONSENSUS_TTL_HOURS: "24"
          FINNHUB_MIN_DELAY_SECONDS: "1.1"
        run: python scripts/generate_analyst_consensus_cache.py
      - name: Commit consensus cache safely
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          mkdir -p /tmp/consensus-cache
          for root in data site/data static/data; do
            mkdir -p "/tmp/consensus-cache/$root"
            [ -f "$root/recommendation_trends.json" ] && cp "$root/recommendation_trends.json" "/tmp/consensus-cache/$root/recommendation_trends.json"
          done
          git fetch origin main
          git reset --hard origin/main
          for root in data site/data static/data; do
            mkdir -p "$root"
            [ -f "/tmp/consensus-cache/$root/recommendation_trends.json" ] && cp "/tmp/consensus-cache/$root/recommendation_trends.json" "$root/recommendation_trends.json"
          done
          git add data/recommendation_trends.json site/data/recommendation_trends.json static/data/recommendation_trends.json 2>/dev/null || true
          if git diff --cached --quiet; then exit 0; fi
          git commit -m "Refresh analyst consensus queue"
          git push origin HEAD:main
