name: Refresh Slow Finnhub Fundamentals

on:
  workflow_dispatch:
  schedule:
    # Monthly safety refresh. Fundamental data does not need minute-level refresh.
    - cron: "0 2 2 * *"

permissions:
  contents: write

concurrency:
  group: stockcheck-slow-finnhub-data
  cancel-in-progress: true

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Sync latest main
        run: |
          git fetch origin main
          git checkout main
          git reset --hard origin/main

      - name: Refresh slow Finnhub bundle
        env:
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
          FINNHUB_BUNDLE_MAX_CALLS_PER_RUN: "30"
          FINNHUB_FINANCIALS_TTL_HOURS: "720"
          FINNHUB_EPS_TTL_HOURS: "168"
          FINNHUB_REC_TTL_HOURS: "168"
        run: python scripts/generate_finnhub_bundle_cached.py

      - name: Validate static data
        run: python scripts/validate_static_data.py

      - name: Commit slow data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A data site/data static/data
          if git diff --cached --quiet; then
            echo "No slow data changes."
            exit 0
          fi
          git commit -m "Refresh slow Finnhub fundamental data"
          git push origin HEAD:main
