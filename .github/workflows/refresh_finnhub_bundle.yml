name: Refresh Finnhub Full Backfill

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: stockcheck-data-publisher
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: pip install -r requirements.txt
      - name: Test unified Finnhub pipeline
        run: |
          python -m py_compile scripts/finnhub_pipeline.py
          python -m unittest tests.test_finnhub_pipeline
      - name: Run full dual-key backfill
        env:
          FINNHUB_API_KEY_EVENTS: ${{ secrets.FINNHUB_API_KEY_EVENTS || secrets.FINNHUB_API_KEY }}
          FINNHUB_API_KEY_ANALYST: ${{ secrets.FINNHUB_API_KEY_ANALYST || secrets.FINNHUB_API_KEY_2 || secrets.FINNHUB_API_KEY }}
          FINNHUB_EVENTS_MAX_CALLS_PER_RUN: "48"
          FINNHUB_ANALYST_MAX_CALLS_PER_RUN: "48"
          FINNHUB_MIN_DELAY_SECONDS: "1.25"
        run: python scripts/finnhub_pipeline.py --mode all
      - run: python scripts/validate_static_data.py
      - name: Publish generated data safely
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/finnhub data/earnings_calendar.json data/eps_surprises.json data/recommendation_trends.json data/finnhub_features.json \
                  site/data/earnings_calendar.json site/data/eps_surprises.json site/data/recommendation_trends.json site/data/finnhub_features.json \
                  static/data/earnings_calendar.json static/data/eps_surprises.json static/data/recommendation_trends.json static/data/finnhub_features.json
          if git diff --cached --quiet; then exit 0; fi
          git commit -m "Refresh unified Finnhub data"
          git pull --rebase origin main
          git push origin HEAD:main
