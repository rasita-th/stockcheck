name: Fill Alert Center Content

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/fill-alert-center-content.yml'
      - 'site/styles.css'
      - 'static/styles.css'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: fill-alert-center-content
  cancel-in-progress: false

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Apply alert content fill
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          marker = '/* v9.4.10 fill alert center content area */'
          css = r'''

          /* v9.4.10 fill alert center content area */
          @media (min-width: 1181px) {
            .content-area,
            .alert-center {
              height: 100%;
            }

            .alert-center {
              min-height: calc(100vh - 170px);
            }

            #alertList,
            .alert-list {
              flex: 1;
              min-height: 0;
              display: flex;
              flex-direction: column;
              overflow-y: auto;
              padding-bottom: 12px;
            }

            #alertList::after,
            .alert-list::after {
              content: "ไม่มีการแจ้งเตือนเพิ่มเติม";
              flex: 1;
              min-height: 120px;
              display: grid;
              place-items: center;
              margin-top: 8px;
              border: 1px dashed var(--border-soft);
              border-radius: 14px;
              color: var(--muted);
              background: rgba(139, 148, 158, 0.025);
              font-size: 13px;
            }
          }
          '''

          changed = False
          for name in ('site/styles.css', 'static/styles.css'):
              path = Path(name)
              text = path.read_text(encoding='utf-8')
              if marker not in text:
                  path.write_text(text.rstrip() + css, encoding='utf-8')
                  changed = True
          print('changed=' + str(changed).lower())
          PY

      - name: Run preflight
        run: bash scripts/preflight.sh

      - name: Commit production CSS
        shell: bash
        run: |
          if git diff --quiet; then
            echo 'No changes needed.'
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add site/styles.css static/styles.css
          git commit -m 'Fill alert center content area'
          git push
