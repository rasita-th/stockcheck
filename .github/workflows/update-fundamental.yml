name: Update static fundamental data

on:
  workflow_dispatch:
  schedule:
    - cron: "23 11 * * *"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "stockcheck-pages-data-update"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Generate static fundamental data
        env:
          INCLUDE_FUNDAMENTALS: "1"
          FUNDAMENTAL_SCAN_WORKERS: "4"
          SEC_GUIDANCE_LOOKBACK_DAYS: "1460"
          SEC_GUIDANCE_MAX_FILINGS: "40"
          SEC_GUIDANCE_MAX_DOCUMENTS_PER_FILING: "8"
        run: python scripts/update_fundamental_data.py

      - name: Commit updated fundamental data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add site/data/fundamental.json
          if git diff --cached --quiet; then
            echo "No fundamental data changes to commit."
          else
            git commit -m "Update static fundamental data"
            git fetch origin main
            git rebase origin/main
            git push origin HEAD:main
          fi

      - name: Generate fresh technical data for this deploy
        env:
          INCLUDE_FUNDAMENTALS: "0"
          TECHNICAL_RANGE: "1y"
          TECHNICAL_INTERVAL: "1d"
          TECHNICAL_SCAN_WORKERS: "8"
        run: python scripts/update_technical_data.py

      - name: Prepare clean single-runtime Pages artifact
        run: |
          python -m py_compile scripts/prepare_stable_site_v9_4_1.py
          python scripts/prepare_stable_site_v9_4_1.py

      - name: Validate JavaScript and static data
        run: |
          node --check site/app.js
          node --check site/app-shell-v9-4-6.js
          node --check site/market.js
          python scripts/validate_static_data.py
          grep -q 'app-shell-v9-4-6.js?v=9.4.6' site/index.html
          if grep -Eq 'scanner-dashboard|scanner-layout-v9-3|shared-app-shell-v9-3|nav-fix-v9-2|runtime-guard-v9-4-1' site/index.html site/market.html; then
            echo 'Legacy runtime found in data workflow artifact'
            exit 1
          fi

      - name: Add nojekyll marker
        run: touch site/.nojekyll

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
