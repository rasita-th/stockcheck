name: Audit PR3 Refresh

on:
  workflow_run:
    workflows: ["Refresh Live Data v10 PR3"]
    types: [completed]

permissions:
  actions: read
  contents: write

concurrency:
  group: audit-pr3-refresh
  cancel-in-progress: false

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout latest main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Collect workflow outcome and failed steps
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const run = context.payload.workflow_run;
            const jobs = await github.paginate(github.rest.actions.listJobsForWorkflowRun, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id: run.id,
              per_page: 100,
            });
            const failedSteps = [];
            const jobSummary = [];
            for (const job of jobs) {
              jobSummary.push({
                name: job.name,
                status: job.status,
                conclusion: job.conclusion,
                html_url: job.html_url,
              });
              for (const step of job.steps || []) {
                if (!['success', 'skipped', 'neutral'].includes(step.conclusion)) {
                  failedSteps.push({
                    job: job.name,
                    step: step.name,
                    status: step.status,
                    conclusion: step.conclusion,
                    number: step.number,
                  });
                }
              }
            }
            const receipt = {
              schema_version: '1.0',
              workflow_name: run.name,
              run_id: run.id,
              run_number: run.run_number,
              event: run.event,
              status: run.status,
              conclusion: run.conclusion,
              head_branch: run.head_branch,
              head_sha: run.head_sha,
              html_url: run.html_url,
              created_at: run.created_at,
              updated_at: run.updated_at,
              jobs: jobSummary,
              failed_steps: failedSteps,
            };
            fs.writeFileSync('.github/refresh-receipt.json', JSON.stringify(receipt, null, 2) + '\n');

      - name: Add repository data evidence
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          receipt_path = Path('.github/refresh-receipt.json')
          receipt = json.loads(receipt_path.read_text(encoding='utf-8'))
          attention_path = Path('data/generated/attention_today.json')
          state_path = Path('data/source_state/pr3_discovered_events.json')

          attention = {}
          if attention_path.exists():
              try:
                  attention = json.loads(attention_path.read_text(encoding='utf-8'))
              except Exception as exc:
                  receipt['attention_read_error'] = str(exc)

          state = {}
          if state_path.exists():
              try:
                  state = json.loads(state_path.read_text(encoding='utf-8'))
              except Exception as exc:
                  receipt['state_read_error'] = str(exc)

          quality = attention.get('data_quality') if isinstance(attention.get('data_quality'), dict) else {}
          features = attention.get('features') if isinstance(attention.get('features'), dict) else {}
          receipt['repository_evidence'] = {
              'contract_version': attention.get('contract_version'),
              'data_updated_at': attention.get('updated_at'),
              'catalyst_count': len(attention.get('items') or []) if isinstance(attention.get('items'), list) else None,
              'technical_watch_count': len(attention.get('technical_watch') or []) if isinstance(attention.get('technical_watch'), list) else None,
              'retention_feature': features.get('discovered_event_retention'),
              'active_discovered_event_count': quality.get('active_discovered_event_count'),
              'newly_discovered_event_count': quality.get('newly_discovered_event_count'),
              'state_file_exists': state_path.exists(),
              'state_active_count': state.get('active_count') if isinstance(state, dict) else None,
              'state_updated_at': state.get('updated_at') if isinstance(state, dict) else None,
          }
          receipt_path.write_text(json.dumps(receipt, ensure_ascii=False, indent=2) + '\n', encoding='utf-8')
          PY

      - name: Commit refresh audit receipt
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/refresh-receipt.json
          if git diff --cached --quiet; then
            echo "Refresh receipt is unchanged."
            exit 0
          fi
          git commit -m "Record PR3 refresh workflow result"
          for attempt in 1 2 3; do
            git fetch origin main
            git rebase origin/main
            if git push origin HEAD:main; then
              exit 0
            fi
            git rebase --abort 2>/dev/null || true
            sleep $((attempt * 3))
          done
          echo "Unable to publish PR3 refresh receipt."
          exit 1
