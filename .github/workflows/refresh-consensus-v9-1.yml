name: Refresh Finnhub Analyst Features

on:
  workflow_dispatch:
  schedule:
    # Every 6 hours. Recommendation changes are slow; each run advances the queue.
    - cron: "37 */6 * * *"

permissions:
  contents: write

concurrency:
  group: stockcheck-data-publisher
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 18
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: pip install -r requirements.txt
      - name: Refresh analyst queue with key B
        env:
          FINNHUB_API_KEY_ANALYST: ${{ secrets.FINNHUB_API_KEY_ANALYST || secrets.FINNHUB_API_KEY_2 || secrets.FINNHUB_API_KEY }}
          FINNHUB_ANALYST_MAX_CALLS_PER_RUN: "48"
          FINNHUB_MIN_DELAY_SECONDS: "1.25"
        run: python scripts/finnhub_pipeline.py --mode analyst
      - run: |
          python -m unittest tests.test_finnhub_pipeline
          python scripts/validate_static_data.py
      - name: Publish analyst contracts
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/finnhub data/recommendation_trends.json data/finnhub_features.json \
                  site/data/recommendation_trends.json site/data/finnhub_features.json \
                  static/data/recommendation_trends.json static/data/finnhub_features.json
          if git diff --cached --quiet; then exit 0; fi
          git commit -m "Refresh Finnhub analyst features"
          git pull --rebase origin main
          git push origin HEAD:main
