name: Refresh Consensus v9.1

on:
  workflow_dispatch:
  schedule:
    - cron: "*/30 * * * *"

permissions:
  contents: write

concurrency:
  group: stockcheck-v9-1-generated
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: pip install -r requirements.txt
      - run: python scripts/build_generated_layer.py
      - name: Refresh consensus queue
        env:
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
          ANALYST_CONSENSUS_MAX_CALLS_PER_RUN: "2"
          ANALYST_CONSENSUS_TTL_HOURS: "168"
          FINNHUB_MIN_DELAY_SECONDS: "1.1"
        run: |
          python scripts/generate_analyst_consensus_cache.py
          cp site/data/recommendation_trends.json data/generated/recommendation_trends.json
      - run: |
          python scripts/generate_health.py
          python scripts/publish_generated_data.py
      - name: Commit consensus and health
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/generated/recommendation_trends.json data/generated/health.json \
                  site/data/recommendation_trends.json site/data/health.json \
                  static/data/recommendation_trends.json static/data/health.json
          if git diff --cached --quiet; then exit 0; fi
          git commit -m "Refresh consensus cache and health"
          git push origin HEAD:main
